name: support-agent
description: Customer support ticket resolution environment

entrypoint: server.app:main

tasks:
  - name: easy
    description: Simple billing issue
  - name: medium
    description: Refund issue
  - name: hard
    description: Technical issue

actions:
  - classify
  - respond
  - resolve

observation_space:
  ticket: string
  category: string
  priority: string
  response: string
  resolved: boolean
  conversation: list
  turn_count: integer

reward_range: [-1, 5]