name: support-agent
description: Customer support ticket resolution environment

entrypoint: server.app:main

tasks:
  - name: easy
    description: Simple billing issue
  - name: medium
    description: Refund issue
  - name: hard
    description: Technical issue

actions:
  - classify
  - respond
  - feedback
  - resolve

observation_space:
  ticket_state: object
  reward_breakdown: object
  event_log: array

reward_range: [-5, 10]